name: online_course
description: Online Course App

version: 1.0.0+1

environment:
  sdk: ">=3.1.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^4.3.0
  firebase_auth: ^6.1.3
  cloud_firestore: ^6.1.1
  firebase_database: ^12.1.1

  # Auth & User
  google_sign_in: ^6.2.1

  # State Management
  flutter_bloc: ^9.1.1
  get_it: ^9.2.0
  equatable: ^2.0.5

  # UI / UX
  cupertino_icons: ^1.0.2
  cached_network_image: ^3.4.1
  carousel_slider: ^5.0.0
  flutter_svg: ^2.2.3
  flutter_slidable: ^4.0.3
  bottom_sheet: ^4.0.4
  liquid_pull_to_refresh: ^3.0.1
  readmore: ^3.0.0
  rive: ^0.12.4
  flutter_markdown: ^0.7.3
  markdown: ^7.2.2
  syncfusion_flutter_pdfviewer: ^32.1.21
  bubble: ^1.2.1

  # Web & Media
  url_launcher: ^6.2.6
  flutter_inappwebview: ^6.0.0
  youtube_player_flutter: ^9.1.3

  # Utilities
  permission_handler: ^12.0.1
  device_info_plus: ^12.3.0
  no_screenshot: ^0.3.1

  # Payments
  razorpay_flutter: ^1.4.0

  # Meetings
  jitsi_meet_flutter_sdk: ^11.6.0
  dartz: ^0.10.1
  sqflite: ^2.4.2
  share_plus: ^12.0.1
  visibility_detector: ^0.4.0+2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  change_app_package_name: ^1.5.0
  flutter_launcher_icons: ^0.14.4
  mocktail: ^1.0.4

flutter:
  uses-material-design: true

  assets:
    - assets/icons/
    - assets/images/
    - assets/images/logo.png
    - assets/icons/categories/
    - assets/anim/succes.riv

flutter_icons:
  android: true
  ios: true
  image_path: "assets/images/logo.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/logo.png"
